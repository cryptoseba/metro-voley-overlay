<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 1280px; height: 720px; overflow: hidden; background: transparent; }
iframe { width: 1280px; height: 720px; border: none; background: transparent; }
</style>
</head>
<body>
<iframe id="overlay-frame" src="about:blank" allowtransparency="true"></iframe>
<script>
const SUPABASE_URL = 'https://wasegmbdptbhxojlfepa.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indhc2VnbWJkcHRiaHhvamxmZXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNjk0MzksImV4cCI6MjA5MTk0NTQzOX0.Qm_v0vD9OUIoE038rX0AHYa4QVEkrI9iEMzzEpdNzqo';

const BASE = 'https://cryptoseba.github.io/metro-voley-overlay';
const OVERLAYS = {
  voley:    BASE + '/voley.html',
  carousel: BASE + '/carousel.html'
};

let currentOverlay = null;

async function checkOverlay() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/overlay_config?id=eq.1`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const data = await res.json();
    const active = data?.[0]?.active_overlay || 'voley';
    if (active !== currentOverlay) {
      currentOverlay = active;
      const url = OVERLAYS[active] || OVERLAYS.voley;
      document.getElementById('overlay-frame').src = url;
    }
  } catch(e) {
    if (!currentOverlay) {
      currentOverlay = 'voley';
      document.getElementById('overlay-frame').src = OVERLAYS.voley;
    }
  }
}

checkOverlay();
setInterval(checkOverlay, 10000);
</script>
</body>
</html>
