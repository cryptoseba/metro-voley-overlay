<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 1280px; height: 720px; overflow: hidden; background: transparent; }
#carousel {
  width: 1280px; height: 720px;
  position: relative;
}
.slide {
  position: absolute; inset: 0;
  opacity: 0; transition: opacity 1s ease;
}
.slide.active { opacity: 1; }
.slide img {
  width: 100%; height: 100%; object-fit: cover;
}
</style>
</head>
<body>
<div id="carousel"></div>
<script>
const SUPABASE_URL = 'https://wasegmbdptbhxojlfepa.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indhc2VnbWJkcHRiaHhvamxmZXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNjk0MzksImV4cCI6MjA5MTk0NTQzOX0.Qm_v0vD9OUIoE038rX0AHYa4QVEkrI9iEMzzEpdNzqo';

async function loadCarousel() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/carousel_images?order=order_index&active=eq.true`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  const images = await res.json();
  if (!images || !images.length) return;

  const container = document.getElementById('carousel');
  images.forEach((img, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '');
    div.innerHTML = `<img src="${img.url}" alt="${img.title || ''}">`;
    container.appendChild(div);
  });

  let current = 0;
  function next() {
    const slides = document.querySelectorAll('.slide');
    slides[current].classList.remove('active');
    current = (current + 1) % slides.length;
    slides[current].classList.add('active');
    const dur = (images[current]?.duration_seconds || 5) * 1000;
    setTimeout(next, dur);
  }
  const firstDur = (images[0]?.duration_seconds || 5) * 1000;
  setTimeout(next, firstDur);
}
loadCarousel();
</script>
</body>
</html>
