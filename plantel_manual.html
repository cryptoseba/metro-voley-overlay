<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 1280px; height: 720px; overflow: hidden; background: transparent; }

#overlay {
  position: absolute; inset: 0;
  background: rgba(8,8,16,0.93);
  opacity: 0; transition: opacity 0.6s ease;
}
#overlay.visible { opacity: 1; }

#header {
  position: absolute; top: 24px; left: 80px; right: 80px;
  display: flex; align-items: flex-end; justify-content: space-between;
}
#teamNameWrap { display: flex; align-items: center; gap: 18px; }
#teamLogo { width: 76px; height: 76px; object-fit: contain; flex-shrink: 0; display: none; }
#teamName {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 72px; line-height: 1; color: #ffffff; letter-spacing: 4px;
}
#headerRight { text-align: right; display: flex; flex-direction: column; gap: 4px; padding-bottom: 6px; }
#plantelLabel { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 5px; }
#matchLabel { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.9); letter-spacing: 2px; text-transform: uppercase; }

#divider {
  position: absolute; top: 118px; left: 80px; right: 80px;
  height: 2px; background: rgba(255,255,255,0.07);
}
#divider-color { height: 100%; width: 60px; transition: background 0.4s; }

#grid {
  position: absolute; top: 136px; left: 80px; right: 80px; bottom: 20px;
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; align-content: start;
  overflow: hidden;
}

.player-row {
  display: flex; align-items: stretch;
  background: rgba(255,255,255,0.05); border-radius: 5px; overflow: hidden;
  opacity: 0; transform: translateY(6px);
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.player-row.shown { opacity: 1; transform: translateY(0); }
.player-row.on-court { background: rgba(255,255,255,0.09); }
.player-accent { width: 3px; flex-shrink: 0; }
.player-num {
  font-family: 'Bebas Neue', sans-serif; font-size: 36px; line-height: 1;
  width: 56px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
}
.player-sep { width: 1px; background: rgba(255,255,255,0.07); margin: 8px 0; flex-shrink: 0; }
.player-info { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 10px; min-width: 0; }
.player-last { font-family: 'DM Sans', sans-serif; font-size: 17px; font-weight: 700; color: #ffffff; line-height: 1.15; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-first { font-family: 'DM Sans', sans-serif; font-size: 12px; color: rgba(255,255,255,0.75); }
.player-badges { display: flex; flex-direction: column; justify-content: center; gap: 2px; padding: 6px 8px 6px 0; flex-shrink: 0; }
.badge { font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 1px; padding: 2px 5px; border-radius: 3px; }
.badge-cap { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.6); }
.badge-lib { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); }
</style>
</head>
<body>
<div id="overlay">
  <div id="header">
    <div id="teamNameWrap">
      <img id="teamLogo" src="" alt="">
      <div id="teamName">CARGANDO</div>
    </div>
    <div id="headerRight">
      <div id="plantelLabel">PLANTEL</div>
      <div id="matchLabel">Metro Voley 2026</div>
    </div>
  </div>
  <div id="divider"><div id="divider-color"></div></div>
  <div id="grid"></div>
</div>

<script>
const SUPABASE_URL = 'https://wasegmbdptbhxojlfepa.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indhc2VnbWJkcHRiaHhvamxmZXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNjk0MzksImV4cCI6MjA5MTk0NTQzOX0.Qm_v0vD9OUIoE038rX0AHYa4QVEkrI9iEMzzEpdNzqo';

const CONFIG = {
  matchId: '',
  homeName: 'LOCAL',
  awayName: 'VISITANTE',
  homeColor: '#FF5C1A',
  awayColor: '#00e676',
  homeStripe: null,
  awayStripe: null,
  activeOverlay: 'plantel_manual',
  plantelTeam: 'home',
  homeTeamId: null,
  awayTeamId: null,
};

let currentTeam = 'home';
let lastPlayersHash = null;

async function sbGet(table, filters = '') {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${filters}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  return res.json();
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function applyTheme(side) {
  const color = side === 'home' ? CONFIG.homeColor : CONFIG.awayColor;
  const name  = side === 'home' ? CONFIG.homeName  : CONFIG.awayName;
  const logo  = side === 'home' ? CONFIG.homeLogo  : CONFIG.awayLogo;

  document.getElementById('teamName').textContent = name.toUpperCase();
  document.getElementById('plantelLabel').style.color = color;
  document.getElementById('divider-color').style.background = color;

  const logoEl = document.getElementById('teamLogo');
  if (logo) { logoEl.src = logo; logoEl.style.display = 'block'; }
  else       { logoEl.src = ''; logoEl.style.display = 'none'; }
}

function renderPlayers(players, color) {
  const grid = document.getElementById('grid');

  if (!players || !players.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:rgba(255,255,255,0.3);font-family:DM Sans,sans-serif;font-size:14px;letter-spacing:2px;text-transform:uppercase">— Sin jugadoras cargadas —</div>';
    return;
  }

  const display = players.slice(0, 15);
  const nRows   = Math.ceil(display.length / 3);
  const gridH   = 564;
  const gap     = 6;
  const rowH    = Math.floor((gridH - gap * (nRows - 1)) / nRows);
  const clampH  = Math.max(44, Math.min(76, rowH));
  const numSize   = Math.round(clampH * 0.52);
  const lastSize  = Math.max(12, Math.round(clampH * 0.26));
  const firstSize = Math.max(10, Math.round(clampH * 0.18));
  const rgb = hexToRgb(color);

  grid.innerHTML = display.map(p => {
    let badgeHtml = '';
    if (p.is_captain) badgeHtml += `<span class="badge badge-cap">CAP</span>`;
    if (p.is_libero)  badgeHtml += `<span class="badge badge-lib">LIB</span>`;
    return `<div class="player-row" style="height:${clampH}px">
      <div class="player-accent" style="background:${color}"></div>
      <div class="player-num" style="color:${color};font-size:${numSize}px;width:${Math.round(clampH*0.78)}px">${p.number}</div>
      <div class="player-sep"></div>
      <div class="player-info" style="padding:0 10px">
        <div class="player-last" style="font-size:${lastSize}px">${(p.last_name || '').toUpperCase()}</div>
        <div class="player-first" style="font-size:${firstSize}px">${p.first_name || ''}</div>
      </div>
      ${badgeHtml ? `<div class="player-badges">${badgeHtml}</div>` : ''}
    </div>`;
  }).join('');

  requestAnimationFrame(() => {
    grid.querySelectorAll('.player-row').forEach((r, i) => setTimeout(() => r.classList.add('shown'), i * 35));
  });
}

async function loadPlayers() {
  const teamId = currentTeam === 'home' ? CONFIG.homeTeamId : CONFIG.awayTeamId;
  if (!teamId) {
    renderPlayers([], '');
    return;
  }
  try {
    const players = await sbGet('players', `?team_id=eq.${teamId}&order=number`);
    const hash = JSON.stringify(players);
    if (hash === lastPlayersHash) return;
    lastPlayersHash = hash;
    const color = currentTeam === 'home' ? CONFIG.homeColor : CONFIG.awayColor;
    renderPlayers(players || [], color);
  } catch(e) {
    renderPlayers([], '');
  }
}

async function loadConfigFromSupabase() {
  try {
    const [cfgArr, teams] = await Promise.all([
      sbGet('overlay_config', '?id=eq.1'),
      sbGet('teams', '')
    ]);
    const cfg = cfgArr && cfgArr[0];
    if (!cfg) throw new Error('no config');

    CONFIG.matchId       = cfg.match_id || '';
    CONFIG.activeOverlay = cfg.active_overlay || 'plantel_manual';
    CONFIG.plantelTeam   = cfg.plantel_team || 'home';
    CONFIG.homeTeamId    = cfg.home_team_id || null;
    CONFIG.awayTeamId    = cfg.away_team_id || null;

    const home = teams?.find(t => t.id === cfg.home_team_id);
    const away = teams?.find(t => t.id === cfg.away_team_id);

    if (home) {
      CONFIG.homeName  = home.name;
      CONFIG.homeColor = home.color_primary;
      CONFIG.homeLogo  = home.logo_url || '';
    }
    if (away) {
      CONFIG.awayName  = away.name;
      CONFIG.awayColor = away.color_primary;
      CONFIG.awayLogo  = away.logo_url || '';
    }

    currentTeam = CONFIG.plantelTeam;
  } catch(e) {
    console.log('Error cargando config:', e.message);
  }

  applyTheme(currentTeam);
  document.getElementById('overlay').classList.add('visible');
  await loadPlayers();

  // Re-leer config cada 15s
  setInterval(async () => {
    try {
      const cfgArr = await sbGet('overlay_config', '?id=eq.1');
      const cfg = cfgArr && cfgArr[0];
      if (!cfg) return;

      const newOverlay = cfg.active_overlay || 'plantel_manual';
      if (newOverlay !== CONFIG.activeOverlay) {
        window.location.href = 'index.html';
        return;
      }

      // Cambió el equipo
      const newTeam = cfg.plantel_team || 'home';
      if (newTeam !== currentTeam) {
        currentTeam = newTeam;
        lastPlayersHash = null;
        applyTheme(currentTeam);
        await loadPlayers();
      }

      // Cambió el equipo configurado (nuevo partido)
      const newHomeId = cfg.home_team_id;
      const newAwayId = cfg.away_team_id;
      if (newHomeId !== CONFIG.homeTeamId || newAwayId !== CONFIG.awayTeamId) {
        CONFIG.homeTeamId = newHomeId;
        CONFIG.awayTeamId = newAwayId;
        lastPlayersHash = null;
        await loadPlayers();
      }
    } catch(e) {}
  }, 15000);
}

loadConfigFromSupabase();
</script>
</body>
</html>
