<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 1280px; height: 720px;
  overflow: hidden; background: transparent;
}

/* ── variables compartidas ── */
:root {
  --bg:        rgba(7,7,13,0.65);
  --bg-dark:   rgba(7,7,13,0.65);
  --radius:    12px;
}

/* ════════════════════════════════
   MARCADOR
════════════════════════════════ */
#scoreboard {
  position: absolute;
  opacity: 0; transition: opacity 0.5s ease;
}
#scoreboard.visible { opacity: 1; }
#scoreboard.bottom-center { bottom: var(--scoreboard-bottom, 40px); left: 50%; transform: translateX(-50%); }
#scoreboard.top-center    { top: 56px;    left: 50%; transform: translateX(-50%); }
#scoreboard.bottom-left   { bottom: 16px; left: 36px; }
#scoreboard.top-left      { top: 56px;    left: 36px; }

.wrapper { display: flex; flex-direction: column; align-items: center; }

.board {
  display: flex; align-items: stretch;
  height: 60px; width: 540px;
  border-radius: 0 0 var(--radius) var(--radius);
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08);
  border-top: none;
}

/* equipos */
.team {
  display: flex; align-items: center; gap: 11px;
  padding: 0 16px; flex: 1;
  position: relative; overflow: hidden; min-width: 0;
}
.team::before {
  content: ''; position: absolute; inset: 0;
  background: rgba(7,7,13,0.65);
}
.team.home { flex-direction: row-reverse; justify-content: flex-end; }
.team.home .team-info { align-items: flex-end; text-align: right; }
.team.home .sets-row  { flex-direction: row-reverse; justify-content: flex-start; }

/* franjas de color */
.team-stripe {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 4px; z-index: 2;
}
.team-stripe-tri {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 4px; z-index: 2; display: flex;
}

/* pelota de saque */
.serve-ball {
  font-size: 14px; line-height: 1;
  flex-shrink: 0;
  position: relative; z-index: 1;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.15s, visibility 0.15s;
  margin: 0 6px;
  pointer-events: none;
}
.serve-ball.visible {
  opacity: 1;
  visibility: visible;
  transition: opacity 0.15s 0.1s, visibility 0s 0.1s;
}
.serve-ball::after { content: '🏐'; }

/* info equipo */
.team-info {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; gap: 5px;
  min-width: 0; flex: 1;
}
.name-row { display: flex; align-items: center; gap: 6px; }
.team-name {
  font-family: 'Bebas Neue', sans-serif; font-size: 20px;
  letter-spacing: 2.5px; color: #ffffff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1;
}

/* dots de sets */
.sets-row { display: flex; flex-direction: row; gap: 8px; align-items: center; }
.team.home .sets-row { flex-direction: row-reverse; justify-content: flex-start; }
.set-dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: rgba(255,255,255,0.35);
  transition: background 0.4s ease, box-shadow 0.4s ease; flex-shrink: 0;
}
.set-dot.won { background: var(--dot-color); box-shadow: 0 0 8px var(--dot-color); }

/* bloque central puntaje */
.score-block {
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; width: 164px; position: relative;
}
.score-block::before {
  content: ''; position: absolute; inset: 0; background: rgba(7,7,13,0.80);
}
.score-block::after {
  content: ''; position: absolute; inset: 0;
  border-left: 1px solid rgba(255,255,255,0.06);
  border-right: 1px solid rgba(255,255,255,0.06);
  pointer-events: none;
}
.scores-row {
  display: flex; align-items: center;
  position: relative; z-index: 1;
}
.score {
  font-family: 'Bebas Neue', sans-serif; font-size: 47px;
  line-height: 1; width: 60px; text-align: center;
}
.score.home { color: var(--home-color, #FF5C1A); }
.score.away { color: var(--away-color, #00e676); }
.score.bump { animation: bump 0.28s ease; }
@keyframes bump {
  0%   { transform: scale(1); }
  45%  { transform: scale(1.32); }
  100% { transform: scale(1); }
}
.score-sep {
  font-family: 'Bebas Neue', sans-serif; font-size: 28px;
  color: rgba(255,255,255,0.55); width: 20px; text-align: center;
  position: relative; z-index: 1; line-height: 1;
}

/* lengüeta SET */
.set-tab {
  display: none;
}

/* ════════════════════════════════
   TIEMPO MUERTO
════════════════════════════════ */
#timeout-banner {
  position: absolute;
  bottom: var(--timeout-bottom, 130px); left: 50%; transform: translateX(-50%);
  display: flex; align-items: stretch;
  background: rgba(7,7,13,0.65);
  border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.08);
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s ease;
  white-space: nowrap;
  overflow: hidden;
}
#timeout-banner.visible { opacity: 1; }
.timeout-bar  { width: 5px; flex-shrink: 0; }
.timeout-inner { display: flex; align-items: center; gap: 14px; padding: 10px 24px; }
.timeout-text { display: flex; flex-direction: column; gap: 2px; }
.timeout-label {
  font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 600;
  color: #ffffff; letter-spacing: 3px; text-transform: uppercase;
}
.timeout-team {
  font-family: 'Bebas Neue', sans-serif; font-size: 26px;
  color: #ffffff; letter-spacing: 2px; line-height: 1;
}
.timeout-icon { display: flex; gap: 3px; align-items: center; }

/* ════════════════════════════════
   FIN DE SET
════════════════════════════════ */
#setfinish-banner {
  position: absolute;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  display: flex; flex-direction: row; align-items: stretch;
  background: rgba(7,7,13,0.75);
  border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.08);
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s ease;
  overflow: hidden;
}
#setfinish-banner.visible { opacity: 1; }
.setfinish-bar { width: 5px; flex-shrink: 0; }
.setfinish-content {
  display: flex; flex-direction: column;
  padding: 16px 32px; gap: 6px;
  align-items: center;
}
.setfinish-label {
  font-family: 'DM Sans', sans-serif; font-size: 17px; font-weight: 600;
  color: rgba(255,255,255,0.9); letter-spacing: 4px; text-transform: uppercase;
}
.setfinish-sets-score {
  display: flex; align-items: center; justify-content: center;
}
.setfinish-sets-global {
  font-family: 'Bebas Neue', sans-serif; font-size: 52px;
  color: #ffffff; letter-spacing: 3px; line-height: 1;
}
.setfinish-sets-divider { display: none; }
.setfinish-set-detail {
  font-family: 'Bebas Neue', sans-serif; font-size: 24px;
  color: rgba(255,255,255,0.7); letter-spacing: 1px; line-height: 1;
  text-align: center;
}

/* ════════════════════════════════
   RESULTADO FINAL
════════════════════════════════ */
#result-banner {
  position: absolute;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  display: flex; flex-direction: row; align-items: stretch;
  background: rgba(7,7,13,0.75);
  border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.08);
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s ease;
}
#result-banner.visible { opacity: 1; }

.result-color-bar {
  width: 5px; flex-shrink: 0;
}
.result-content {
  display: flex; flex-direction: column;
  padding: 16px 32px; gap: 8px;
  align-items: flex-start;
}
.result-winner-label {
  font-family: 'DM Sans', sans-serif; font-size: 17px; font-weight: 600;
  color: rgba(255,255,255,0.9); letter-spacing: 4px; text-transform: uppercase;
}
.result-main-row {
  display: flex; align-items: baseline; gap: 14px;
}
.result-winner-name {
  font-family: 'Bebas Neue', sans-serif; font-size: 52px;
  letter-spacing: 3px; line-height: 1;
}
.result-winner-score {
  font-family: 'Bebas Neue', sans-serif; font-size: 52px;
  letter-spacing: 2px; line-height: 1;
  color: rgba(255,255,255,0.7);
}
.result-sets { display: flex; align-items: center; gap: 10px; }
.result-set {
  font-family: 'Bebas Neue', sans-serif; font-size: 26px;
  color: rgba(255,255,255,0.8); letter-spacing: 1px;
}
.result-set-divider {
  width: 1px; height: 18px; background: rgba(255,255,255,0.35);
}

/* ════════════════════════════════
   CARRUSEL DE PUBLICIDAD
════════════════════════════════ */
#carousel-banner {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 532px; height: 300px;
  border-radius: 12px;
  overflow: hidden;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s ease;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.08);
}
#carousel-banner.visible { opacity: 1; }
.carousel-slide {
  position: absolute; inset: 0;
  opacity: 0;
  transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}
.carousel-slide.active { opacity: 1; }
.carousel-slide.exit { opacity: 0; }
.carousel-slide img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}
</style>
</head>
<body>

<div id="setfinish-banner">
  <div class="setfinish-bar" id="setfinishBar"></div>
  <div class="setfinish-content">
    <div class="setfinish-label" id="setfinishLabel">FIN 1ER SET</div>
    <div class="setfinish-sets-score">
      <div class="setfinish-sets-global" id="setfinishGlobal">1-0</div>
    </div>
    <div class="setfinish-set-detail" id="setfinishDetail">25-17</div>
  </div>
</div>

<div id="result-banner">
  <div class="result-color-bar" id="resultBar"></div>
  <div class="result-content">
    <div class="result-winner-label">PARTIDO TERMINADO · GANADOR</div>
    <div class="result-main-row">
      <div class="result-winner-name" id="resultWinner"></div>
      <div class="result-winner-score" id="resultScore"></div>
    </div>
    <div class="result-sets" id="resultSets"></div>
  </div>
</div>

<div id="timeout-banner">
  <div class="timeout-bar" id="timeoutBar" style="background:#FF5C1A"></div>
  <div class="timeout-inner">
    <div class="timeout-text">
      <div class="timeout-label" id="timeoutLabel">TIEMPO MUERTO</div>
      <div class="timeout-team" id="timeoutTeam">SAN GREGORIO</div>
    </div>
    <div class="timeout-icon">
      <div style="width:3px;height:16px;background:#ffffff;border-radius:1px"></div>
      <div style="width:3px;height:16px;background:#ffffff;border-radius:1px"></div>
    </div>
  </div>
</div>

<div id="scoreboard">
  <div class="wrapper">
    <div class="board">

      <!-- Local -->
      <div class="team home">
        <div class="team-stripe-tri" id="homeStripe">
          <div id="homeStripe1" style="flex:1"></div>
          <div id="homeStripe2" style="flex:1"></div>
          <div id="homeStripe3" style="flex:1"></div>
        </div>
        <div class="team-info">
          <div class="name-row">
            <div class="serve-ball" id="homeServe"></div>
            <div class="team-name" id="homeName">SAN GREGORIO</div>
          </div>
          <div class="sets-row" id="homeSets">
            <div class="set-dot" style="--dot-color:var(--home-color)"></div>
            <div class="set-dot" style="--dot-color:var(--home-color)"></div>
            <div class="set-dot" style="--dot-color:var(--home-color)"></div>
          </div>
        </div>
      </div>

      <!-- Marcador -->
      <div class="score-block">
        <div class="scores-row">
          <div class="score home" id="homeScore">0</div>
          <div class="score-sep">-</div>
          <div class="score away" id="awayScore">0</div>
        </div>
      </div>

      <!-- Visitante -->
      <div class="team away">
        <div class="team-stripe-tri" id="awayStripe">
          <div id="awayStripe1" style="flex:1"></div>
          <div id="awayStripe2" style="flex:1"></div>
          <div id="awayStripe3" style="flex:1"></div>
        </div>
        <div class="team-info">
          <div class="name-row">
            <div class="team-name" id="awayName">VISITANTE</div>
            <div class="serve-ball" id="awayServe"></div>
          </div>
          <div class="sets-row" id="awaySets">
            <div class="set-dot" style="--dot-color:var(--away-color)"></div>
            <div class="set-dot" style="--dot-color:var(--away-color)"></div>
            <div class="set-dot" style="--dot-color:var(--away-color)"></div>
          </div>
        </div>
      </div>

    </div>
    <div class="set-tab" id="setLabel">SET 1</div>
  </div>
</div>

<div id="carousel-banner"></div>

<script>
// ============================================================
// CONFIGURACIÓN — se carga desde Supabase automáticamente
// ============================================================
const SUPABASE_URL = 'https://wasegmbdptbhxojlfepa.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indhc2VnbWJkcHRiaHhvamxmZXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNjk0MzksImV4cCI6MjA5MTk0NTQzOX0.Qm_v0vD9OUIoE038rX0AHYa4QVEkrI9iEMzzEpdNzqo';
const PROXY_URL = 'https://project-pa42k.vercel.app';

const CONFIG = {
  matchId:   '158191',
  homeName:  'LOCAL',
  awayName:  'VISITANTE',
  homeColor: '#FF5C1A',
  awayColor: '#00e676',
  homeStripe: null,
  awayStripe: null,
  position:  'bottom-center',
  scoreboardBottom: 40
};

async function sbGet(table, filters='') {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${filters}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  return res.json();
}
// ============================================================

// ── SignalR via Proxy ─────────────────────────────────────────
let srToken = null;
let srMsgId = null;
let srPolling = false;
let prevHome = -1;
let prevAway = -1;
let prevSetNumber = -1;
let localServing = null;
let prevHomeSets = -1;
let prevAwaySets = -1;

async function initSignalR() {
  if (!CONFIG.matchId) return;
  try {
    console.log('Llamando negotiate...');
    const neg = await fetch(`${PROXY_URL}/api/signalr/negotiate?matchId=${CONFIG.matchId}`);
    console.log('Negotiate status:', neg.status);
    const negData = await neg.json();
    console.log('Negotiate data:', JSON.stringify(negData).slice(0, 100));
    if (negData.error) throw new Error(negData.error);
    srToken = negData.token;
    srMsgId = negData.messageId;
    console.log('Token OK, invoking...');
    const scoreData = await srInvoke('getLiveScoreData_From_DV', [CONFIG.matchId, 'fmv']);
    console.log('Score data:', JSON.stringify(scoreData).slice(0, 200));
    if (scoreData) {
      applyConfig(CONFIG.homeName, CONFIG.awayName);
      CONFIG._namesApplied = true;
      processInitialScore(scoreData);
    }
    srPolling = true;
    console.log('Starting poll loop...');
    srPollLoop();
  } catch(e) {
    console.log('SignalR proxy falló:', e.message);
    applyConfig(CONFIG.homeName, CONFIG.awayName);
    CONFIG._namesApplied = true;
    fetchScoreFallback();
    setInterval(fetchScoreFallback, 3000);
  }
}

async function srInvoke(method, args) {
  try {
    const res = await fetch(`${PROXY_URL}/api/signalr/invoke`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ token: srToken, messageId: srMsgId, method, args, invokeId: Date.now() })
    });
    const data = await res.json();
    return data.result;
  } catch(e) { return null; }
}

async function srPollLoop() {
  if (!srPolling) return;
  try {
    const res = await fetch(
      `${PROXY_URL}/api/signalr/poll?token=${encodeURIComponent(srToken)}&messageId=${encodeURIComponent(srMsgId)}`
    );
    const data = await res.json();
    if (data.C) srMsgId = data.C;
    if (data.M && data.M.length) {
      for (const msg of data.M) handleHubMessage(msg);
    }
  } catch(e) {
    // silencioso
  }
  // Polling cada 2 segundos
  if (srPolling) setTimeout(srPollLoop, 2000);
}

function handleHubMessage(msg) {
  const method = msg.M;
  const args = msg.A || [];

  if (method === 'updateMatchScoreData_DV') {
    const obj = args[0] || {};
    // obj.HP/GP = puntos set actual, obj.H/G = sets ganados, obj.S = status
    const hp = obj.HP !== undefined ? obj.HP : 0;
    const gp = obj.GP !== undefined ? obj.GP : 0;
    processScoreUpdate(hp, gp, obj.H || 0, obj.G || 0, obj.S);
  }

  if (method === 'updatePlayByPlayLastRallyData') {
    const list = args[0] || [];
    if (!list.length) return;
    const last = list[list.length - 1];
    if (last.RallyT === 3 && last.Skill === 'T_' && last.RallyID !== lastTimeoutRallyId) {
      lastTimeoutRallyId = last.RallyID;
      const teamSide  = last.TeamHG === 1 ? 'home' : 'away';
      const teamName  = teamSide === 'home' ? CONFIG.homeName : CONFIG.awayName;
      const teamColor = teamSide === 'home' ? CONFIG.homeColor : CONFIG.awayColor;
      const count = (args[0] || []).filter(r => r.RallyT === 3 && r.Skill === 'T_' && r.TeamHG === last.TeamHG).length;
      showTimeout(teamName, teamColor, count === 1 ? '1ER TIEMPO MUERTO' : '2DO TIEMPO MUERTO');
    }
  }
}

function processInitialScore(score) {
  resultShown = false;
  prevHome = -1;
  prevAway = -1;
  prevHomeSets = -1;
  prevAwaySets = -1;

  const homeSets = score.WonSetHome || 0;
  const awaySets = score.WonSetGuest || 0;
  const status   = score.Status !== undefined ? score.Status : 1;
  const totalSets = homeSets + awaySets;
  const setKeys = ['Set1','Set2','Set3','Set4','Set5'];

  // Mostrar puntaje del último set jugado
  const lastSetIdx = Math.max(0, totalSets - 1);
  const key = setKeys[Math.min(lastSetIdx, 4)];
  const hp = score[key + 'Home'] || 0;
  const gp = score[key + 'Guest'] || 0;

  // Actualizar marcador con último set
  document.getElementById('homeScore').textContent = hp;
  document.getElementById('awayScore').textContent = gp;
  document.getElementById('setLabel').textContent = `SET ${totalSets}`;
  updateSets('homeSets', homeSets);
  updateSets('awaySets', awaySets);
  prevHome = hp;
  prevAway = gp;
  prevHomeSets = homeSets;
  prevAwaySets = awaySets;

  // Si partido terminado, mostrar banner de resultado
  if (status === 2) {
    const sets = [];
    for (let i = 0; i < totalSets; i++) {
      const k = setKeys[i];
      sets.push({ homeTeamScore: score[k+'Home'] || 0, awayTeamScore: score[k+'Guest'] || 0 });
    }
    showResultBanner(homeSets, awaySets, sets);
  }
}

function showResultBanner(homeSets, awaySets, sets) {
  const isHomeWinner = homeSets > awaySets;
  const winnerName   = isHomeWinner ? CONFIG.homeName : CONFIG.awayName;
  const winnerColor  = isHomeWinner ? CONFIG.homeColor : CONFIG.awayColor;
  const winnerSets   = isHomeWinner ? homeSets : awaySets;
  const loserSets    = isHomeWinner ? awaySets : homeSets;

  document.getElementById('resultSets').innerHTML = sets.map((s, i) =>
    (i > 0 ? '<div class="result-set-divider"></div>' : '') +
    `<div class="result-set">${s.homeTeamScore}-${s.awayTeamScore}`+`</div>`
  ).join('');
  document.getElementById('resultWinner').textContent = (winnerName || 'GANADOR').toUpperCase();
  document.getElementById('resultWinner').style.color = winnerColor || '#ffffff';
  document.getElementById('resultScore').textContent = `${winnerSets}-${loserSets}`;
  document.getElementById('resultBar').style.background = winnerColor || '#ffffff';
  document.getElementById('scoreboard').style.transition = 'opacity 0.6s ease';
  document.getElementById('scoreboard').style.opacity = '0';
  document.getElementById('result-banner').classList.add('visible');
}

function processScoreUpdate(hp, gp, homeSets, awaySets, status) {
  // ── PARTIDO TERMINADO ──
  if (status === 0 && !resultShown) {
    resultShown = true;
    bannerQueue.length = 0;
    bannerBusy = false;
    document.getElementById('setfinish-banner').classList.remove('visible');
    document.getElementById('timeout-banner').classList.remove('visible');
    const sets = [];
    for (let i = 0; i < homeSets + awaySets; i++) {
      sets.push({ homeTeamScore: 0, awayTeamScore: 0 });
    }
    showResultBanner(homeSets, awaySets, sets);
    return;
  }

  // ── MARCADOR EN VIVO ──
  const currentSetNum = homeSets + awaySets + 1;

  if (currentSetNum !== prevSetNumber) {
    prevSetNumber = currentSetNum;
    prevHome = -1;
    prevAway = -1;
    localServing = null;
  }

  if (hp !== prevHome) {
    document.getElementById('homeScore').textContent = hp;
    if (prevHome >= 0) {
      bump('homeScore');
      localServing = 'home';
      document.getElementById('timeout-banner').classList.remove('visible');
      bannerQueue.length = 0; bannerBusy = false;
    }
    prevHome = hp;
  }
  if (gp !== prevAway) {
    document.getElementById('awayScore').textContent = gp;
    if (prevAway >= 0) {
      bump('awayScore');
      localServing = 'away';
      document.getElementById('timeout-banner').classList.remove('visible');
      bannerQueue.length = 0; bannerBusy = false;
    }
    prevAway = gp;
  }

  document.getElementById('setLabel').textContent = `SET ${currentSetNum}`;
  updateSets('homeSets', homeSets);
  updateSets('awaySets', awaySets);

  // Saque basado en último punto
  const serving = localServing;
  if (serving) {
    document.getElementById('homeServe').classList.toggle('visible', serving === 'home');
    document.getElementById('awayServe').classList.toggle('visible', serving === 'away');
  }

  // ── FIN DE SET ──
  if ((homeSets !== prevHomeSets || awaySets !== prevAwaySets) && prevHomeSets >= 0) {
    const winnerSide = homeSets > prevHomeSets ? 'home' : 'away';
    const matchWouldBeOver = homeSets >= 3 || awaySets >= 3;
    if (!matchWouldBeOver && scoreObj) {
      const setKeys = ['Set1','Set2','Set3','Set4','Set5'];
      const allSets = [];
      for (let i = 0; i < homeSets + awaySets; i++) {
        const k = setKeys[i];
        if (scoreObj[k+'Home'] !== undefined) allSets.push({ homeTeamScore: scoreObj[k+'Home'], awayTeamScore: scoreObj[k+'Guest'], statusId: 2 });
      }
      showSetFinish(homeSets + awaySets, homeSets, awaySets, allSets, winnerSide);
    }
  }

  prevHomeSets = homeSets;
  prevAwaySets = awaySets;
}

// ── Fallback polling si SignalR no conecta ────────────────────
async function fetchScoreFallback() {
  if (!CONFIG.matchId) return;
  try {
    const res = await fetch(`${PROXY_URL}/api/matches/${CONFIG.matchId}/updates`);
    if (!res.ok) return;
    const data = await res.json();
    if (!CONFIG._namesApplied) { applyConfig(CONFIG.homeName, CONFIG.awayName); CONFIG._namesApplied = true; }
    const matchStatus = data.match?.statusId;
    if (matchStatus === 2 && !resultShown) {
      const isHomeWinner = data.match.homeTeamSets > data.match.awayTeamSets;
      processScoreUpdate(0, 0, data.match.homeTeamSets, data.match.awayTeamSets, 0);
      return;
    }
    const score = data.liveState?.score;
    if (!score) return;
    const csNum = data.match?.currentSet ?? 1;
    const csData = data.match?.sets?.find(s => s.number === csNum);
    if (csData) {
      processScoreUpdate(csData.homeTeamScore, csData.awayTeamScore, data.match.homeTeamSets, data.match.awayTeamSets, 3);
    }
  } catch(e) {}
}

let lastTimeoutId = null;

function applyConfig(homeName, awayName) {
  const { homeColor, awayColor, homeStripe, awayStripe, position, scoreboardBottom } = CONFIG;
  document.getElementById('scoreboard').className = position + ' visible';
  document.getElementById('homeName').textContent = (homeName || 'LOCAL').toUpperCase();
  document.getElementById('awayName').textContent = (awayName || 'VISITANTE').toUpperCase();
  document.documentElement.style.setProperty('--home-color', homeColor || '#FF5C1A');
  document.documentElement.style.setProperty('--away-color', awayColor || '#00e676');
  const b = scoreboardBottom || 40;
  document.documentElement.style.setProperty('--scoreboard-bottom', b + 'px');
  document.documentElement.style.setProperty('--timeout-bottom', (b + 90) + 'px');
  const hs = (homeStripe && homeStripe.length === 3) ? homeStripe : [homeColor, homeColor, homeColor];
  const as = (awayStripe && awayStripe.length === 3) ? awayStripe : [awayColor, awayColor, awayColor];
  document.getElementById('homeStripe1').style.background = hs[0];
  document.getElementById('homeStripe2').style.background = hs[1];
  document.getElementById('homeStripe3').style.background = hs[2];
  document.getElementById('awayStripe1').style.background = as[0];
  document.getElementById('awayStripe2').style.background = as[1];
  document.getElementById('awayStripe3').style.background = as[2];
}

// ── Cola de banners — evita que se pisen ─────────────────────
const bannerQueue = [];
let bannerBusy = false;

function enqueueBanner(fn) {
  bannerQueue.push(fn);
  if (!bannerBusy) processQueue();
}

function processQueue() {
  if (bannerQueue.length === 0) { bannerBusy = false; return; }
  bannerBusy = true;
  const next = bannerQueue.shift();
  next();
}

function bannerDone() {
  // Pequeña pausa entre banners
  setTimeout(processQueue, 600);
}

// ── Mostrar tiempo muerto ─────────────────────────────────────
function showTimeout(teamName, color, label, duration) {
  enqueueBanner(() => {
    document.getElementById('timeoutTeam').textContent = (teamName || '').toUpperCase();
    document.getElementById('timeoutBar').style.background = color || '#ffffff';
    document.getElementById('timeoutLabel').textContent = label || 'TIEMPO MUERTO';
    document.getElementById('timeout-banner').classList.add('visible');
    setTimeout(() => {
      document.getElementById('timeout-banner').classList.remove('visible');
      bannerDone();
    }, duration || 10000);
  });
}

// ── Mostrar fin de set ────────────────────────────────────────
function showSetFinish(setNum, homeSetsWon, awaySetsWon, allSets, winnerSide) {
  enqueueBanner(() => {
    const ordinals = ['1ER', '2DO', '3ER', '4TO', '5TO'];
    const label  = `FIN ${ordinals[setNum - 1] || setNum + 'TO'} SET`;
    const global = `${homeSetsWon}-${awaySetsWon}`;
    const detail = allSets
      .filter(s => s.statusId === 2)
      .map(s => `${s.homeTeamScore}-${s.awayTeamScore}`)
      .join('  |  ');
    const color = winnerSide === 'home' ? CONFIG.homeColor : CONFIG.awayColor;

    document.getElementById('setfinishLabel').textContent = label;
    document.getElementById('setfinishGlobal').textContent = global;
    document.getElementById('setfinishDetail').textContent = detail;
    document.getElementById('setfinishBar').style.background = color;

    const sb = document.getElementById('scoreboard');
    sb.style.transition = 'opacity 0.4s ease';
    sb.style.opacity = '0';
    document.getElementById('setfinish-banner').classList.add('visible');

    setTimeout(() => {
      document.getElementById('setfinish-banner').classList.remove('visible');
      sb.style.opacity = '1';
      bannerDone();
    }, 15000);
  });
}

function updateSets(elId, won) {
  document.querySelectorAll(`#${elId} .set-dot`).forEach((d, i) => d.classList.toggle('won', i < won));

// ── Cargar config desde Supabase al arrancar ─────────────────
async function loadConfigFromSupabase() {
  try {
    const [cfgArr, teams] = await Promise.all([
      sbGet('overlay_config', '?id=eq.1'),
      sbGet('teams', '')
    ]);
    const cfg = cfgArr && cfgArr[0];
    if (!cfg) throw new Error('no config');

    CONFIG.matchId = cfg.match_id || CONFIG.matchId;
    CONFIG.position = cfg.scoreboard_position || CONFIG.position;
    CONFIG.scoreboardBottom = cfg.scoreboard_bottom || CONFIG.scoreboardBottom;
    CONFIG.activeOverlay = cfg.active_overlay || 'voley';
    CONFIG.dataSource = cfg.data_source || 'metrovoley';

    const home = teams && teams.find(t => t.id === cfg.home_team_id);
    const away = teams && teams.find(t => t.id === cfg.away_team_id);

    if (home) {
      CONFIG.homeName  = home.name;
      CONFIG.homeColor = home.color_primary;
      CONFIG.homeStripe = [home.color_stripe_1, home.color_stripe_2, home.color_stripe_3];
    }
    if (away) {
      CONFIG.awayName  = away.name;
      CONFIG.awayColor = away.color_primary;
      CONFIG.awayStripe = [away.color_stripe_1, away.color_stripe_2, away.color_stripe_3];
    }

  } catch(e) {
    console.log('Error cargando config de Supabase:', e.message);
    CONFIG.activeOverlay = 'voley';
    CONFIG.dataSource = 'dataproject';
  }

  console.log('activeOverlay:', CONFIG.activeOverlay, 'dataSource:', CONFIG.dataSource, 'matchId:', CONFIG.matchId);
  applyConfig(CONFIG.homeName, CONFIG.awayName);

  if (CONFIG.activeOverlay === 'carousel') {
    startCarousel();
  } else if (CONFIG.activeOverlay === 'plantel') {
    window.location.href = 'plantel.html';
  } else if (CONFIG.activeOverlay === 'none') {
    document.getElementById('scoreboard').style.opacity = '0';
  } else {
    if (CONFIG.dataSource === 'dataproject') {
      console.log('Iniciando SignalR para matchId:', CONFIG.matchId);
      initSignalR();
    } else {
      applyConfig(CONFIG.homeName, CONFIG.awayName);
      CONFIG._namesApplied = true;
      fetchScoreFallback();
      setInterval(fetchScoreFallback, 3000);
    }
  }

  // Re-leer config de Supabase cada 15s
  setInterval(async () => {
    try {
      const cfgArr = await sbGet('overlay_config', '?id=eq.1');
      if (!cfgArr || !cfgArr[0]) return;
      const cfg = cfgArr[0];
      const newMatchId = cfg.match_id || CONFIG.matchId;
      const newOverlay = cfg.active_overlay || 'voley';
      const newBottom = cfg.scoreboard_bottom || CONFIG.scoreboardBottom;

      // Cambió el overlay activo → recargar página
      if (newOverlay !== CONFIG.activeOverlay) {
        if (newOverlay === 'plantel') {
          window.location.href = 'plantel.html';
          return;
        }
        location.reload();
        return;
      }

      // Cambió el matchId
      if (newMatchId !== CONFIG.matchId) {
        CONFIG.matchId = newMatchId;
        prevHome = prevAway = prevHomeSets = prevAwaySets = -1;
        resultShown = false;
      }

      // Cambió la posición
      if (newBottom !== CONFIG.scoreboardBottom) {
        CONFIG.scoreboardBottom = newBottom;
        applyConfig(CONFIG.homeName, CONFIG.awayName);
      }
    } catch(e) {}
  }, 5000);
}
loadConfigFromSupabase();

// ── Carrusel ──────────────────────────────────────────────────
async function startCarousel() {
  document.getElementById('scoreboard').style.opacity = '0';

  const images = await sbGet('carousel_images', '?order=order_index&active=eq.true');
  if (!images || !images.length) return;

  const banner = document.getElementById('carousel-banner');

  // Crear slides
  images.forEach((img, i) => {
    const div = document.createElement('div');
    div.className = 'carousel-slide' + (i === 0 ? ' active' : '');
    div.innerHTML = `<img src="${img.url}" alt="${img.title || ''}">`;
    banner.appendChild(div);
  });

  banner.classList.add('visible');

  let current = 0;
  function nextSlide() {
    const slides = banner.querySelectorAll('.carousel-slide');
    const dur = (images[current]?.duration_seconds || 5) * 1000;
    slides[current].classList.remove('active');
    current = (current + 1) % slides.length;
    slides[current].classList.add('active');
    setTimeout(nextSlide, (images[current]?.duration_seconds || 5) * 1000);
  }
  setTimeout(nextSlide, (images[0]?.duration_seconds || 5) * 1000);
}

  if (c.awayStripe) CONFIG.awayStripe = c.awayStripe;
  if (c.position)  CONFIG.position  = c.position;
  applyConfig(CONFIG.homeName, CONFIG.awayName);
});
